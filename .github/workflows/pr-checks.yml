name: Manual PR Checks

on:
  workflow_dispatch: 

jobs:
  validate-code:
    name: Validate Python and Docker
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar Dependências de Teste e Linters
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black pytest requests-mock pandas requests
          
      - name: Checagem de Formatação (Black)
        run: black --check .

      - name: Checagem de Sintaxe Python (Flake8)
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Rodar Testes Unitários (Pytest)
        run: pytest tests/ -v

      - name: Testar Build do Docker
        run: docker build -t dry-run-test .
